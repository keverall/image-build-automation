# GitLab CI/CD Pipeline - Full conversion of Jenkins Jenkinsfile
# Equivalent to jenkins/Jenkinsfile PowerShell implementation

stages:
  - setup
  - docs
  - secrets
  - scan
  - test
  - orchestrator
  - firmware
  - windows
  - combine
  - deploy
  - reporting
  - monitoring

variables:
  POWERSHELL_VERSION: "7.4"
  PSS_SCRIPT_ANALYZER: "install"
  TIMEOUT_MINUTES: "240"

# =============================================================================
# 1. SETUP
# =============================================================================
setup:
  stage: setup
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  script:
    - pwsh -Command "
      \$ErrorActionPreference = 'Stop';
      $modRoot = Join-Path $PSScriptRoot 'src/powershell/Automation';
      Import-Module \$modRoot -Force -ErrorAction Stop;
      Write-Host '[SETUP] Automation module imported';
      Get-ChildItem 'configs/*.json' | ForEach-Object {
        try { Get-Content \$_.FullName | ConvertFrom-Json | Out-Null }
        catch { Write-Error \"Invalid JSON: \$(\$_.Name)\" }
      };
      Write-Host '[SETUP] All JSON configs valid';
      "
  artifacts:
    reports:
      dotenv: env.env
  only:
    - triggers

# =============================================================================
# 2. DOCUMENTATION
# =============================================================================
docs:
  stage: docs
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["setup"]
  script:
    - pwsh scripts/Generate-PSDocs.ps1 -Force
  artifacts:
    paths:
      - docs/generated/**
    expire_in: 7 days
  only:
    - triggers

# =============================================================================
# 3. SECRETS (CyberArk)
# =============================================================================
secrets:
  stage: secrets
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["setup"]
  script:
    - pwsh -Command "
      # CyberArk secret fetching logic
      Write-Host '[CyberArk] Bootstrap secrets';
      "
  only:
    - triggers

# =============================================================================
# 4. CODE QUALITY SCAN
# =============================================================================
scan:
  stage: scan
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["setup"]
  script:
    - pwsh -Command "
      if (-not (Get-Module PSScriptAnalyzer -ListAvailable)) {
        Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -AllowClobber
      }
      Invoke-ScriptAnalyzer -Path 'src/powershell' -Recurse -ReportSummary
      "
  artifacts:
    reports:
      codequality: psanalyzer.json
  allow_failure: true
  only:
    - triggers

# =============================================================================
# 5. MAINTENANCE MODE - iREQUEST ENTRY
# =============================================================================
irequest-maintenance:
  stage: setup
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["setup"]
  script:
    - pwsh -File ./src/powershell/Automation/Public/Invoke-GitLabMaintenance.ps1
      -ACTION "$ACTION"
      -CLUSTER_ID "$CLUSTER_ID"
      -START "$START"
      -END "$END"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    ACTION: "enable"
    CLUSTER_ID: ""
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
      changes:
        - src/powershell/Automation/Public/Set-MaintenanceMode.ps1
  artifacts:
    paths:
      - logs/
  allow_failure: false

# =============================================================================
# 6. FIRMWARE ISOs
# =============================================================================
firmware:
  stage: firmware
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["scan"]
  rules:
    - if: '$BUILD_STAGE == "firmware" || $BUILD_STAGE == "all"'
  script:
    - pwsh -Command "
      Update-Firmware -ServerList (Get-Content 'configs/server_list.txt') -OutputDir 'generated/output/firmware'
      "
  artifacts:
    paths:
      - generated/output/firmware/**/*.iso
  only:
    - triggers

# =============================================================================
# 7. WINDOWS ISOs
# =============================================================================
windows:
  stage: windows
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["firmware"]
  rules:
    - if: '$BUILD_STAGE == "windows" || $BUILD_STAGE == "all"'
  script:
    - pwsh -Command "
      # Windows ISO patching logic
      Write-Host '[WINDOWS] Building patched ISOs';
      "
  artifacts:
    paths:
      - generated/output/patched/**/*.iso
  only:
    - triggers

# =============================================================================
# 8. OPSRAMP REPORTING
# =============================================================================
opsramp:
  stage: reporting
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["windows"]
  rules:
    - if: '$OPSRAMP_ENABLED == "true"'
  script:
    - pwsh -Command "
      Get-ChildItem 'output/results/*.json' | ForEach-Object {
        $data = Get-Content \$_.FullName | ConvertFrom-Json
        Invoke-OpsRamp -ServerName \$data.server -BuildData \$data
      }
      "
  only:
    - triggers

# =============================================================================
# 9. FINAL REPORT
# =============================================================================
report:
  stage: reporting
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["opsramp"]
  script:
    - pwsh -Command "
      $summary = @{
        build_date = (Get-Date).ToString('yyyy-MM-dd')
        total = (Get-ChildItem 'output/results/*.json').Count
        successful = (Get-ChildItem 'output/results/*.json' | Where-Object { 
          (Get-Content \$_.FullName | ConvertFrom-Json).success 
        }).Count
      } | ConvertTo-Json
      Set-Content -Path 'output/summary.json' -Value \$summary
      "
  artifacts:
    paths:
      - output/summary.json
  only:
    - triggers