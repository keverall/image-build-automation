# =============================================================================
# HPE ProLiant Windows Server ISO Automation — GitLab CI Pipeline
# =============================================================================
# Stages: lint → test → security
# Coverage threshold: 70%
# =============================================================================

stages:
  - lint
  - test
  - security
  - maintenance

variables:
  POWERSHELL_VERSION: "7.4"
  COVERAGE_THRESHOLD: "70"
  # Callback settings - must be set in GitLab CI/CD variables
  # MAINTENANCE_CALLBACK_URL - webhook URL for completion callback
  # MAINTENANCE_API_KEY - optional API key for callback authentication

# =============================================================================
# Lint Stage
# =============================================================================
.lint_template: &lint_template
  stage: lint
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
  script:
    - pwsh -File ./scripts/lint.ps1
  artifacts:
    reports:
      metrics: metrics.txt
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

lint-powershell:
  <<: *lint_template
  script:
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
    - pwsh -File ./scripts/lint.ps1

# =============================================================================
# Test Stage
# =============================================================================
.test_template: &test_template
  stage: test
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force"
  script:
    # Run tests with coverage
    - pwsh -File ./scripts/run-coverage.ps1 -TestPath tests/powershell -SourcePath src/powershell -OutputFile generated/output/coverage/coverage-results.xml -Threshold 70
    # Report coverage summary
    - pwsh -File ./scripts/CoverageSummary.ps1 -InputFile generated/output/coverage/coverage-results.xml -OutputFile generated/output/coverage/coverage-report.txt
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: generated/output/coverage/coverage-results.xml
    paths:
      - generated/output/coverage/coverage-results.xml
      - generated/output/coverage/coverage-report.txt
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

test-unit:
  <<: *test_template
  script:
    - pwsh -Command "Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force"
    - pwsh -File ./scripts/run-tests.ps1
    - pwsh -File ./scripts/CoverageSummary.ps1 -InputFile generated/output/coverage/coverage-results.xml -OutputFile generated/output/coverage/coverage-report.txt

# =============================================================================
# Security Stage
# =============================================================================
security-scan:
  stage: security
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
  script:
    # PSScriptAnalyzer security rules
    - pwsh -NoProfile -Command "Import-Module PSScriptAnalyzer; \
        `$results = Invoke-ScriptAnalyzer -Path 'src/powershell' -Recurse -Severity Error | \
          Where-Object { `$_.RuleName -notin @('PSUseBOMForUnicodeEncodedFile', 'PSUseToExportFieldsInManifest', 'PSUseShouldProcessForStateChangingFunctions', 'PSUseApprovedVerbs', 'PSUseSingularNouns', 'PSAvoidUsingWriteHost', 'PSAvoidUsingConvertToSecureStringWithPlainText', 'PSAvoidUsingUsernameAndPasswordParams', 'TypeNotFound') }; \
        `$results | Format-Table -AutoSize; \
        if (`$results) { exit 1 }"
    # Check for hardcoded secrets (basic pattern matching)
    - pwsh -NoProfile -Command "Get-ChildItem -Path 'src/powershell' -Recurse -Include *.ps1,*.json | Select-String -Pattern 'password|secret|key|token' -List | ForEach-Object { Write-Warning \"Potential secret found in: `$(`$_.Path)`" }"
    # Validate JSON config files
    - pwsh -NoProfile -Command "Get-ChildItem -Path 'configs' -Recurse -Include *.json | ForEach-Object { try { Get-Content `$(`$_.FullName) -Raw | ConvertFrom-Json | Out-Null; Write-Host 'Valid JSON: `$(`$_.Name)' } catch { Write-Error \"Invalid JSON in `$(`$_.Name): `$(`$_.Exception.Message)\"; exit 1 } }"
  artifacts:
    expire_in: 1 week
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

# =============================================================================
# Maintenance Stage (existing jobs)
# =============================================================================
.maintenance_defaults: &maintenance_defaults
  stage: maintenance
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
artifacts:
    paths:
      - generated/logs/
    expire_in: 7 days
  only:
    - triggers

maintenance-enable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "enable"
      -CLUSTER_ID "$CLUSTER_ID"
      -START "$START"
      -END "$END"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    FF_NETWORK_PER_BUILD: "true"

maintenance-disable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "disable"
      -CLUSTER_ID "$CLUSTER_ID"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    FF_NETWORK_PER_BUILD: "true"

maintenance-validate:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "validate"
      -CLUSTER_ID "$CLUSTER_ID"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"

maintenance-auto-disable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "disable"
      -CLUSTER_ID "$CLUSTER_ID"
      -CONFIG_DIR "$CONFIG_DIR"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  when: manual
  allow_failure: true