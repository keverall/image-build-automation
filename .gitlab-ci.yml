# =============================================================================
# HPE ProLiant Windows Server ISO Automation — GitLab CI Pipeline
# =============================================================================
# Stages: bootstrap → lint → test → security → maintenance
# Coverage threshold: 70%
# =============================================================================

stages:
  - bootstrap
  - lint
  - test
  - security
  - maintenance

variables:
  POWERSHELL_VERSION: "7.4"
  COVERAGE_THRESHOLD: "70"
  # CyberArk settings - must be set in GitLab CI/CD variables (Masked)
  CYBERARK_CCP_URL: "https://cyberark-ccp:443/AIMWebService/API/Accounts"
  CYBERARK_APP_ID: "ci"
  # Callback settings - must be set in GitLab CI/CD variables (Masked)
  # MAINTENANCE_CALLBACK_URL - webhook URL for completion callback
  # MAINTENANCE_API_KEY - optional API key for callback authentication

# =============================================================================
# Bootstrap Stage (CyberArk Secret Fetching)
# =============================================================================
cyberark-bootstrap:
  stage: bootstrap
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  script:
    - pwsh -File ./scripts/cyberark-bootstrap.ps1 -CyberArkUrl "$CYBERARK_CCP_URL" -AppId "$CYBERARK_APP_ID" -ExportForGitLab > secrets.env
    - pwsh -Command "if (Test-Path 'secrets.env') { Get-Content 'secrets.env' | Write-Host }"
  artifacts:
    reports:
      dotenv: secrets.env
    expire_in: 1 hour
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger"'
  allow_failure: false

# =============================================================================
# Lint Stage
# =============================================================================
.lint_template: &lint_template
  stage: lint
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
    - pwsh -File ./scripts/prune-logs.ps1
  script:
    - pwsh -File ./scripts/lint.ps1
  artifacts:
    reports:
      metrics: metrics.txt
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

lint-powershell:
  <<: *lint_template
  script:
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
    - pwsh -File ./scripts/lint.ps1

# =============================================================================
# Test Stage
# =============================================================================
.test_template: &test_template
  stage: test
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force"
    - pwsh -File ./scripts/prune-logs.ps1
  script:
    # Run tests with coverage
    - pwsh -File ./scripts/run-coverage.ps1 -TestPath tests/powershell -SourcePath src/powershell -OutputFile generated/output/coverage/coverage-results.xml -Threshold 70
    # Report coverage summary
    - pwsh -File ./scripts/CoverageSummary.ps1 -InputFile generated/output/coverage/coverage-results.xml -OutputFile generated/output/coverage/coverage-report.txt
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: generated/output/coverage/coverage-results.xml
    paths:
      - generated/output/coverage/coverage-results.xml
      - generated/output/coverage/coverage-report.txt
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

test-unit:
  <<: *test_template
  script:
    - pwsh -Command "Install-Module Pester -MinimumVersion 5.0.0 -Scope CurrentUser -Force"
    - pwsh -File ./scripts/run-tests.ps1
    - pwsh -File ./scripts/CoverageSummary.ps1 -InputFile generated/output/coverage/coverage-results.xml -OutputFile generated/output/coverage/coverage-report.txt

# =============================================================================
# Security Stage
# =============================================================================
security-scan:
  stage: security
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -Command "Install-Module PSScriptAnalyzer -Scope CurrentUser -Force"
    - pwsh -File ./scripts/prune-logs.ps1
  script:
    - pwsh -File ./scripts/ci-security-check.ps1
  artifacts:
    expire_in: 1 week
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# =============================================================================
# Maintenance Stage (existing jobs)
# =============================================================================
.maintenance_defaults: &maintenance_defaults
  stage: maintenance
  image: mcr.microsoft.com/powershell:$POWERSHELL_VERSION
  needs: ["cyberark-bootstrap"]
  before_script:
    - pwsh -Command "Set-PSRepository PSGallery -InstallationPolicy Trusted"
    - pwsh -File ./scripts/prune-logs.ps1
  artifacts:
    paths:
      - generated/logs/
    expire_in: 7 days
  only:
    - triggers

maintenance-enable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "enable"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "$MODE"
      -START "$START"
      -END "$END"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    MODE: "scom"
    FF_NETWORK_PER_BUILD: "true"

maintenance-disable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "disable"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "$MODE"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    MODE: "scom"
    FF_NETWORK_PER_BUILD: "true"

maintenance-validate:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "validate"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "$MODE"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    MODE: "scom"

maintenance-auto-disable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "disable"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "$MODE"
      -CONFIG_DIR "$CONFIG_DIR"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    MODE: "scom"
  when: manual
  allow_failure: true

# OneView-specific jobs (hardware level, no cluster nesting)
maintenance-oneview-enable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "enable"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "oneview"
      -START "$START"
      -END "$END"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    FF_NETWORK_PER_BUILD: "true"

maintenance-oneview-disable:
  <<: *maintenance_defaults
  script:
    - pwsh -File ./scripts/gitlab/Invoke-GitLabMaintenance.ps1
      -ACTION "disable"
      -CLUSTER_ID "$CLUSTER_ID"
      -MODE "oneview"
      -CONFIG_DIR "$CONFIG_DIR"
      -DRY_RUN "$DRY_RUN"
      -CALLBACK_URL "$MAINTENANCE_CALLBACK_URL"
      -CALLBACK_API_KEY "$MAINTENANCE_API_KEY"
  variables:
    FF_NETWORK_PER_BUILD: "true"