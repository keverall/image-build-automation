# Docker Compose for HPE ProLiant Windows Server ISO Automation

version: '3.8'

services:
  hpe-iso-automation:
    build:
      context: .
      dockerfile: Dockerfile
    image: hpe-iso-automation:latest

    # Use Windows containers for Windows Server compatibility
    platform: windows

    # Environment variables
    environment:
      - OUTPUT_DIR=/app/output
      - CONFIG_DIR=/app/configs

    # Volume mounts
    volumes:
      - ${OUTPUT_MOUNT:-./output}:/app/output:rw
      - ${LOGS_MOUNT:-./logs}:/app/logs:rw
      - ${CONFIG_MOUNT:-./configs}:/app/configs:ro

    # Network configuration
    networks:
      - automation-network

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

    # Restart policy
    restart: unless-stopped

    # Health check
    healthcheck:
      test: ["CMD", "pwsh", "-Command", "Test-Path 'C:\\app\\src\\powershell\\Automation'"]
      interval: 30s
      timeout: 10s
      retries: 3

# Network configuration
networks:
  automation-network:
    driver: bridge